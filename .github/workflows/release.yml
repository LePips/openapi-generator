name: Release Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PRODUCT_NAME: openapi-generator
  ARTIFACT_BUNDLE_NAME: openapi-generator.artifactbundle

jobs:
  release:
    name: Build and publish release binary
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build artifact bundle
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          OPENAPI_GENERATOR_ARTIFACT_OUTPUT_ROOT="$PWD/dist" \
          Scripts/artifactbundle.sh "${version}"

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          zip_path="dist/${ARTIFACT_BUNDLE_NAME}.zip"
          checksum="$(swift package compute-checksum "${zip_path}")"
          artifact_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${ARTIFACT_BUNDLE_NAME}.zip"

          cat > "${RUNNER_TEMP}/release-notes.md" <<EOF
          ## Artifact Bundle

          \`\`\`swift
          .binaryTarget(
              name: "${PRODUCT_NAME}",
              url: "${artifact_url}",
              checksum: "${checksum}"
          )
          \`\`\`
          EOF

      - name: Publish GitHub release artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body_path: ${{ runner.temp }}/release-notes.md
          fail_on_unmatched_files: true
          files: dist/*.artifactbundle.zip
