name: Release Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PRODUCT_NAME: openapi-generator
  ARTIFACT_BUNDLE_NAME: openapi-generator.artifactbundle

jobs:
  release:
    name: Build and publish release binary
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build release binary
        run: swift build --disable-sandbox -c release --product "${PRODUCT_NAME}" --arch arm64

      - name: Prepare artifact bundle
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          bundle_path="dist/${ARTIFACT_BUNDLE_NAME}"
          variant_path="${PRODUCT_NAME}-macos-arm64/bin"

          mkdir -p "${bundle_path}/${variant_path}"
          cp ".build/release/${PRODUCT_NAME}" "${bundle_path}/${variant_path}/${PRODUCT_NAME}"
          strip "${bundle_path}/${variant_path}/${PRODUCT_NAME}" || true

          cat > "${bundle_path}/info.json" <<EOF
          {
            "schemaVersion": "1.0",
            "artifacts": {
              "${PRODUCT_NAME}": {
                "type": "executable",
                "version": "${version}",
                "variants": [
                  {
                    "path": "${variant_path}/${PRODUCT_NAME}",
                    "supportedTriples": ["arm64-apple-macosx"]
                  }
                ]
              }
            }
          }
          EOF

      - name: Zip artifact bundle
        working-directory: dist
        run: 7z a -tzip "${ARTIFACT_BUNDLE_NAME}.zip" "${ARTIFACT_BUNDLE_NAME}"

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          zip_path="dist/${ARTIFACT_BUNDLE_NAME}.zip"
          checksum="$(swift package compute-checksum "${zip_path}")"
          artifact_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${ARTIFACT_BUNDLE_NAME}.zip"

          cat > "${RUNNER_TEMP}/release-notes.md" <<EOF
          ## Artifact Bundle

          \`\`\`swift
          .binaryTarget(
              name: "${PRODUCT_NAME}",
              url: "${artifact_url}",
              checksum: "${checksum}"
          )
          \`\`\`
          EOF

      - name: Publish GitHub release artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body_path: ${{ runner.temp }}/release-notes.md
          fail_on_unmatched_files: true
          files: dist/*.artifactbundle.zip
