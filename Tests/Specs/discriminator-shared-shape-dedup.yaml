openapi: "3.0.0"
info:
  version: 1.0.0
  title: Discriminator Shared Shape Deduplication

paths: {}

components:
  schemas:
    Cat:
      type: object
      properties:
        Type:
          type: string
        name:
          type: string
    Dog:
      type: object
      properties:
        Type:
          type: string
        name:
          type: string
    Payload:
      oneOf:
        - $ref: "#/components/schemas/Cat"
        - $ref: "#/components/schemas/Dog"
      discriminator:
        propertyName: Type
        mapping:
          cat: "#/components/schemas/Cat"
          dog: "#/components/schemas/Dog"
