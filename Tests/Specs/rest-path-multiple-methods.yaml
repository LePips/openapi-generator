openapi: 3.0.0
info:
  title: REST Path Multiple Methods
  version: 1.0.0
paths:
  /widgets:
    get:
      operationId: listWidgets
      summary: List widgets
      responses:
        "200":
          description: Widget list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Widget"
    post:
      operationId: createWidget
      summary: Create widget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Created widget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
    delete:
      operationId: deleteWidgets
      summary: Delete widgets
      responses:
        "204":
          description: Empty response
components:
  schemas:
    Widget:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        name:
          type: string
