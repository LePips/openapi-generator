openapi: 3.0.0
info:
  title: Runtime Coding Options
  version: 1.0.0
paths: {}
components:
  schemas:
    Widget:
      type: object
      required:
        - id
        - first_name
        - status
      properties:
        id:
          type: integer
          format: int64
        first_name:
          type: string
        active:
          type: boolean
          default: true
        status:
          type: string
          enum:
            - ready
            - not-ready
        link:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string
